# 雀魂机器人配置文件（机器视觉版）
# 复制此文件为 config/config.yaml 并根据需要修改

# ────────────────────────────────────────────────
# 机器视觉配置（主要使用）
# ────────────────────────────────────────────────
vision:
  # 模板根目录（相对于项目根目录）
  # templates/tiles/  - 麻将牌模板图片（1m.png ~ 7z.png）
  # templates/buttons/ - 操作按钮模板图片（pon.png 等）
  templates_dir: "templates"

  # 截图间隔（秒）- 主循环每隔此时间截一次图
  capture_interval: 0.3  # 优化：从0.5降至0.3，更快响应游戏状态

  # 模板匹配阈值（0.0~1.0，越高越严格，越低越容易误识别）
  template_threshold: 0.75

  # 按钮模板匹配阈值（用于碰/吃/杠/立直/和牌按钮）
  button_threshold: 0.72

  # 调试模式：开启后每隔一段时间保存带标注的截图到 logs/debug_latest.png
  debug_mode: false

  # 两次点击之间的全局冷却时间（秒）
  action_cooldown: 1.5  # 优化：从4.0降至1.5，大幅加快响应速度

  # 出牌后等待状态切换的超时时间（秒）
  discard_lock_timeout: 2.0  # 优化：从3.0降至2.0

  # 是否启用打牌锁（默认关闭，避免在可吃/碰等状态下误卡住）
  discard_lock_enabled: false

  # ── 神经网络识别（OpenCV ANN_MLP） ─────────────────────
  # 是否启用 NN 辅助识别（与模板分做融合）
  nn_enabled: true

  # 模型文件路径（训练脚本默认输出到 models/tile_ann.xml）
  nn_model_path: "models/tile_ann.xml"

  # 标签映射路径；留空时自动使用 nn_model_path 同名 .labels.json
  nn_labels_path: ""

  # 融合权重（0~1，越大越偏向 NN，越小越偏向模板）
  nn_fusion_weight: 0.90

  # NN 优先策略（启用后优先采用 NN 识别结果）
  nn_priority: true

  # 当融合分未过 template_threshold 时，NN 兜底最低置信度
  nn_min_confidence: 0.58

  # NN 候选数量（用于融合与日志）
  nn_top_k: 5

  # ── 窗口策略（Windows + pygetwindow） ───────────────────
  # 自动激活并置顶游戏窗口（建议开启，避免焦点丢失）
  auto_topmost: true

  # 锁定窗口分辨率（建议开启，避免识别区域因为缩放漂移）
  lock_resolution: true

  # 锁定尺寸（默认固定为 800x600）
  # 若想改为“按首次检测尺寸锁定”，可将两项都设为 0
  lock_width: 800
  lock_height: 600

  # ── 启动自动化（浏览器/登录） ─────────────────────────────
  # 启动时自动检测浏览器并跳转到雀魂页面
  browser_auto_open: true

  # 自动打开的网址
  browser_url: "https://game.maj-soul.com/1/"

  # 浏览器可执行文件路径（留空=系统默认浏览器）
  browser_executable: ""

  # 打开网址后等待秒数（用于页面加载与窗口激活）
  browser_wait_seconds: 2.0

  # 检测到登录页时，是否自动输入 account.username / account.password 并回车提交
  login_auto_fill: false

  # ── 运行时自动收集数据集（用于后续训练） ───────────────────
  # 是否按识别结果自动保存牌图到数据集目录
  auto_collect_dataset: ture

  # 自动收集输出目录（会按牌名建子目录，如 datasets/auto/1m/*.png）
  auto_collect_dir: "datasets/auto"

  # 自动保存最小置信度（best_score）
  auto_collect_min_score: 0.93

  # 是否保存 unknown_* 牌位（保存到 unknown 子目录）
  auto_collect_include_unknown: false

  # 每个标签最多保存样本数（0=不限制）
  auto_collect_max_per_label: 2000

# ────────────────────────────────────────────────
# 鼠标控制配置
# ────────────────────────────────────────────────
controller:
  # 每次操作前的随机等待时间范围（秒），模拟人类思考时间
  min_delay: 0.3   # 最小延迟（优化：从1.0降至0.3，加快出牌）
  max_delay: 0.8   # 最大延迟（优化：从2.5降至0.8，加快出牌）

  # 点击位置随机偏移（像素），模拟手部抖动
  click_variance: 6

# ────────────────────────────────────────────────
# 游戏策略配置
# ────────────────────────────────────────────────
game:
  # 是否自动准备（进入大厅后自动点击准备）
  auto_ready: true

  # 对局模式（暂时仅供记录，实际由视觉识别按钮位置）
  # 1: 铜之间  2: 银之间  3: 金之间  4: 玉之间
  match_mode: 1

  # 是否优先保持门前清（门清立直策略）
  prefer_riichi: true

# ────────────────────────────────────────────────
# 日志配置
# ────────────────────────────────────────────────
logging:
  level: "INFO"        # DEBUG / INFO / WARNING / ERROR
  file: "logs/vision_bot.log"

# ────────────────────────────────────────────────
# 以下为旧版 WebSocket 配置（已废弃，保留仅供参考）
# ────────────────────────────────────────────────
account:
  # 可选：用于登录页自动填充（需 vision.login_auto_fill=true）
  username: ""
  password: ""
