# 雀魂机器人配置示例文件
# 使用说明：
# 1. 复制此文件为 config.yaml
# 2. 填写您的账号信息和其他配置
# 3. 不要将 config.yaml 提交到版本控制系统

# ================================
# 账号配置
# ================================
account:
  # 雀魂账号用户名（必填）
  username: ""

  # 雀魂账号密码（必填）
  password: ""

# ================================
# 服务器配置
# ================================
server:
  # 服务器地址
  # 国际服：game.mahjongsoul.com
  # 国服：game.maj-soul.com
  host: "game.mahjongsoul.com"

  # 服务器端口（通常为 443）
  port: 443

  # 是否使用 SSL 加密连接
  use_ssl: true

  # WebSocket 路径（可选）
  # 留空表示直接连接到根路径
  # 例如："/ws" 或 "/gateway"
  path: ""

# ================================
# 游戏配置
# ================================
game:
  # 是否自动准备
  # true: 进入房间后自动点击准备
  # false: 需要手动准备
  auto_ready: true

  # 操作延迟范围（秒）
  # 格式：[最小延迟, 最大延迟]
  # 用于模拟人类思考时间，避免被检测为机器人
  delay_range:
    - 1.0   # 最小延迟 1 秒
    - 3.0   # 最大延迟 3 秒

  # 匹配模式
  # 1: 铜之间（初级）
  # 2: 银之间（中级）
  # 3: 金之间（高级）
  # 4: 玉之间（专家）
  match_mode: 1

# ================================
# 日志配置
# ================================
logging:
  # 日志级别
  # DEBUG: 详细的调试信息
  # INFO: 一般信息（推荐）
  # WARNING: 警告信息
  # ERROR: 错误信息
  # CRITICAL: 严重错误
  level: "INFO"

  # 日志文件路径
  # 日志会同时输出到控制台和文件
  file: "logs/bot.log"

# ================================
# 高级配置（可选）
# ================================
# 以下配置为高级选项，一般用户无需修改

# AI 策略配置（未来扩展）
